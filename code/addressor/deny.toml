[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "Unicode-3.0", "CC0-1.0", "Zlib", "ISC", "Unlicense", "MPL-2.0", "BSL-1.0", "Unicode-DFS-2016", "CDLA-Permissive-2.0", "LicenseRef-Cubrim-Commercial"]
private = { ignore = true }
# cubrim-rs is this repo's own commercially-licensed crate (license-file
# based — not SPDX-parsable by cargo-deny); clarified, not third-party.
[[licenses.clarify]]
crate = "cubrim"
expression = "LicenseRef-Cubrim-Commercial"
license-files = [{ path = "LICENSE-SHORT.txt", hash = 0xd598a9ad }]
[[licenses.clarify]]
crate = "addressor"
expression = "LicenseRef-Cubrim-Commercial"
license-files = [{ path = "LICENSE", hash = 0 }]
